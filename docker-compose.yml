version: "3.8"
services:
  taskflow:
    build: .
    container_name: taskflow
    restart: unless-stopped
    working_dir: /app
    command: ./start.sh
    entrypoint: docker-entrypoint.sh
    hostname: taskflow
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=change-me-to-a-long-random-string
      - NEXTAUTH_URL=https://yourdomain.com
      - NODE_ENV=production
    volumes:
      - /var/www/vhosts/sidecloud.net/docker/taskflow/data:/app/data
      - /var/www/vhosts/sidecloud.net/docker/taskflow/uploads:/app/data/uploads
