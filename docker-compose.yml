version: '3.8'

services:
  taskflow:
    build: .
    container_name: taskflow
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - taskflow-data:/app/data
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-a-long-random-string}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NODE_ENV=production

volumes:
  taskflow-data:
    driver: local
